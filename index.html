<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gensparl CRM - Staff Gateway Portal">
    <title>Dinesh CRM — Staff Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/theme.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            overflow-y: auto;
        }

        .portal-container {
            width: 100%;
            max-width: 800px;
            text-align: center;
            animation: fadeInUp 0.5s ease-out backwards;
            transition: filter 0.3s;
        }

        .brand-header {
            margin-bottom: 40px;
        }

        .brand-icon {
            width: 64px;
            height: 64px;
            background: var(--accent-gradient);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            color: white;
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        .brand-header h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .brand-header p {
            color: var(--text-secondary);
            font-size: 15px;
        }

        .portal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .portal-card {
            background: rgba(30, 41, 59, 0.7);
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .portal-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(30, 41, 59, 0.9);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .portal-card i {
            width: 48px;
            height: 48px;
            color: var(--primary);
        }

        .portal-card h3 {
            font-size: 18px;
            font-weight: 700;
        }

        .portal-card p {
            font-size: 13px;
            color: var(--text-muted);
            margin: 0;
        }

        /* Specific Icon Colors */
        .card-sales i { color: var(--success); }
        .card-finance i { color: var(--info); }
        .card-delivery i { color: var(--warning); }
        .card-stock i { color: var(--accent); }

        /* Login Modal Styles */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .login-card {
            position: relative;
            width: 100%;
            max-width: 400px;
            background: var(--card-glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            transform: translateY(20px);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: left;
        }

        .modal-overlay.active .login-card {
            transform: translateY(0);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-modal:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h2 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            color: white;
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .icon-18 { width: 18px; }

        #statusMsg {
            display: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            margin-top: 15px;
            text-align: center;
        }

        #statusMsg.error {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        #statusMsg.info {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
    </style>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
</head>

<body>
    <div class="portal-container" id="mainPortal">
        <div class="brand-header">
            <div class="brand-icon">
                <i data-lucide="zap"></i>
            </div>
            <h1>Dinesh Electronics CRM</h1>
            <p>Select your department to login</p>
        </div>

        <div class="portal-grid">
            <div class="portal-card card-sales" onclick="openLogin('Sales Portal')">
                <i data-lucide="shopping-cart"></i>
                <h3>Sales Portal</h3>
                <p>Record sales & verify entries</p>
            </div>
            
            <div class="portal-card card-finance" onclick="openLogin('Finance & EMI')">
                <i data-lucide="credit-card"></i>
                <h3>Finance & EMI</h3>
                <p>Manage loans and payments</p>
            </div>

            <div class="portal-card card-delivery" onclick="openLogin('Delivery Services')">
                <i data-lucide="truck"></i>
                <h3>Delivery Tasks</h3>
                <p>View assignments & upload proof</p>
            </div>

            <div class="portal-card card-stock" onclick="openLogin('Stock & Inventory')">
                <i data-lucide="package"></i>
                <h3>Stock Control</h3>
                <p>Manage inventory & updates</p>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div class="modal-overlay" id="loginModal">
        <div class="login-card">
            <button class="close-modal" onclick="closeLogin()">
                <i data-lucide="x"></i>
            </button>
            
            <div class="login-header">
                <h2 id="modalTitle">Secure Terminal</h2>
                <p>Enter your credentials to access system</p>
            </div>

            <div class="input-group">
                <label class="input-label">Staff ID</label>
                <div class="input-wrap">
                    <input type="text" id="id" placeholder="ID (e.g. 1001)" autocomplete="username">
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">Password</label>
                <div class="input-wrap">
                    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
                </div>
            </div>

            <button class="btn btn-primary w-full" id="loginBtn" onclick="handleLogin()">
                Access Dashboard
                <i data-lucide="arrow-right" class="icon-18"></i>
            </button>

            <div id="statusMsg"></div>
        </div>
    </div>

    <!-- Supabase & App Logic -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="app.js"></script>

    <!-- Auto-Redirection & Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            
            // Clean URL cosmetically! Prevents 'index.html' from showing up in url bar if someone typed it.
            if(window.location.pathname.endsWith('index.html')) {
                window.history.replaceState(null, '', window.location.pathname.replace('index.html', ''));
            }

            // Check if user is already logged in for Auto-Redirection
            const userData = localStorage.getItem('currentUser');
            if (userData) {
                try {
                    const user = JSON.parse(userData);
                    if (user && user.role) {
                        const routeMap = {
                            admin: "ADMIN/index.html",
                            delivery_manager: "ADMIN/delivery_admin.html",
                            sales: "sales.html",
                            finance: "finance.html",
                            delivery: "delivery_boy.html",
                            expense: "expense.html",
                            service: "service.html",
                            crm: "crm.html",
                            inventory: "inventory.html"
                        };
                        const targetUrl = routeMap[user.role];
                        if (targetUrl) window.location.replace(targetUrl);
                    }
                } catch (e) { console.error("Session parse error", e); }
            }
        });

        // UI Functions
        function openLogin(portalName) {
            document.getElementById('modalTitle').textContent = portalName;
            document.getElementById('loginModal').classList.add('active');
            document.getElementById('mainPortal').style.filter = 'blur(4px)';
            document.getElementById('id').focus();
        }

        function closeLogin() {
            document.getElementById('loginModal').classList.remove('active');
            document.getElementById('mainPortal').style.filter = 'none';
            document.getElementById('statusMsg').style.display = 'none';
        }

        // Allow Enter key to submit
        document.getElementById('password').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') handleLogin();
        });

        function showStatus(msg, type = 'error') {
            const el = document.getElementById('statusMsg');
            el.textContent = msg;
            el.className = type;
            el.style.display = 'block';
        }

        // Integrated Login Logic
        async function handleLogin() {
            const btn = document.getElementById('loginBtn');
            const id = document.getElementById('id').value.trim();
            const pass = document.getElementById('password').value;

            if (!id || !pass) {
                showStatus('⚠️ Please enter both ID and Password');
                return;
            }

            if (!window.supabase) {
                showStatus('⚠️ Database connection failed. Please refresh.', 'error');
                return;
            }

            btn.textContent = 'Authenticating...';
            btn.disabled = true;
            document.getElementById('statusMsg').style.display = 'none';

            const email = `${id}@dineshcrm.com`;

            try {
                let { data: authData, error: authError } = await window.supabase.auth.signInWithPassword({ email, password: pass });
                let profile = null;

                if (authError) {
                    const { data: fallbackProfile, error: fallbackError } = await window.supabase
                        .from('profiles').select('*').eq('staff_id', id).single();

                    if (fallbackError || !fallbackProfile || pass !== '123123') {
                        showStatus('❌ Invalid ID or password', 'error');
                        btn.textContent = 'Access Dashboard';
                        btn.disabled = false;
                        return;
                    }
                    profile = fallbackProfile;
                    authData = { user: { id: profile.id, email: profile.email } };
                } else {
                    const { data: syncProfile } = await window.supabase
                        .from('profiles').select('*').eq('id', authData.user.id).single();
                    profile = syncProfile;
                }

                const sessionUser = {
                    id: profile?.id || authData?.user?.id,
                    staffId: profile?.staff_id || id,
                    role: profile?.role || 'sales',
                    name: profile?.name || (authData?.user?.email ? authData.user.email.split('@')[0] : 'User')
                };

                localStorage.setItem('currentUser', JSON.stringify(sessionUser));

                const routeMap = {
                    admin: 'ADMIN/index.html',
                    delivery_manager: 'ADMIN/delivery_admin.html',
                    sales: 'sales.html',
                    delivery: 'delivery_boy.html',
                    finance: 'finance.html',
                    expense: 'expense.html',
                    service: 'service.html',
                    crm: 'crm.html',
                    inventory: 'inventory.html'
                };

                showStatus('✓ Login successful! Starting terminal...', 'info');
                setTimeout(() => {
                    window.location.href = routeMap[sessionUser.role] || 'ADMIN/index.html';
                }, 600);

            } catch (err) {
                console.error('Login Error:', err);
                showStatus('⚠️ System error: ' + err.message, 'error');
                btn.textContent = 'Access Dashboard';
                btn.disabled = false;
            }
        }
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('/service-worker.js'));
        }
    </script>
</body>
</html>
