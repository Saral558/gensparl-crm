<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Secure Login for Gensparl CRM Staff. Access your professional dashboard and manage sales, deliveries, and more.">
    <title>Login — Dinesh Electronics CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/theme.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-y: auto;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        /* Animated gradient background */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.18;
            animation: drift 12s ease-in-out infinite;
            pointer-events: none;
        }

        .bg-orb-1 {
            width: 600px;
            height: 600px;
            background: #6366f1;
            top: -150px;
            left: -200px;
        }

        .bg-orb-2 {
            width: 500px;
            height: 500px;
            background: #10b981;
            bottom: -100px;
            right: -150px;
            animation-delay: -6s;
        }

        .bg-orb-3 {
            width: 300px;
            height: 300px;
            background: #a855f7;
            top: 30%;
            left: 40%;
            animation-delay: -3s;
        }

        @keyframes drift {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(30px, -20px) scale(1.05);
            }

            66% {
                transform: translate(-20px, 15px) scale(0.95);
            }
        }

        .grid-bg {
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(99, 102, 241, 0.08) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        /* Page Specific Card Adjustments */
        .login-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            animation: fadeInUp 0.6s ease-out;
            background: var(--card-glass, rgba(30, 41, 59, 0.7));
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .brand-icon {
            width: 64px;
            height: 64px;
            background: var(--accent-gradient, linear-gradient(135deg, #6366f1, #a855f7));
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            color: white;
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
        }

        .brand {
            text-align: center;
            margin-bottom: 24px;
        }

        .brand h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            color: white;
        }

        .brand p {
            font-size: 14px;
            color: #94a3b8;
        }

        .divider {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            margin: 24px 0;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 8px;
        }

        .input-wrap input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            transition: 0.2s;
            outline: none;
        }

        .input-wrap input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .btn-primary {
            width: 100%;
            background: #6366f1;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background: #4f46e5;
            transform: translateY(-2px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 12px;
            color: #64748b;
        }

        .roles-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            margin-top: 12px;
        }

        .role-chip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 10px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
        }

        #statusMsg {
            display: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            margin-top: 15px;
            text-align: center;
        }

        #statusMsg.error {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        #statusMsg.info {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .icon-18 {
            width: 18px;
        }
    </style>

    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
</head>

<body>

    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
    <div class="grid-bg"></div>

    <div class="login-card">
        <div class="brand">
            <div class="brand-icon">
                <i data-lucide="zap"></i>
            </div>
            <h1>Dinesh CRM</h1>
            <p class="text-secondary">Secure Terminal — Staff Access</p>
        </div>

        <hr class="divider">

        <div class="input-group">
            <label class="input-label">Staff ID</label>
            <div class="input-wrap">
                <input type="text" id="id" placeholder="ID (e.g. 1001)" autocomplete="username"
                    title="Enter your Staff ID">
            </div>
        </div>

        <div class="input-group">
            <label class="input-label">Password</label>
            <div class="input-wrap">
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
                    title="Enter your account password">
            </div>
        </div>

        <button class="btn btn-primary" id="loginBtn" onclick="login()" title="Sign in to dashboard">
            Access Dashboard
            <i data-lucide="arrow-right" class="icon-18"></i>
        </button>

        <div id="statusMsg"></div>

        <div class="footer">
            <span>Secure Terminal Access v2.0</span>
            <div class="roles-row">
                <span class="role-chip">Admin</span>
                <span class="role-chip">Sales</span>
                <span class="role-chip">Finance</span>
                <span class="role-chip">Delivery</span>
                <span class="role-chip">Stock</span>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="app.js"></script>

    <!-- Auto-Redirect and Login Logic -->
    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Clean URL cosmetically! Prevents 'index.html' from showing up in url bar if someone typed it.
        if (window.location.pathname.endsWith('index.html')) {
            window.history.replaceState(null, '', window.location.pathname.replace('index.html', ''));
        }

        // Check if user is already logged in for Auto-Redirection
        const userData = localStorage.getItem('currentUser');
        if (userData) {
            try {
                const user = JSON.parse(userData);
                if (user && user.role) {
                    const routeMap = {
                        admin: "ADMIN/index.html",
                        staff: "sales.html",
                        delivery_boy: "delivery_boy.html"
                    };
                    const targetUrl = routeMap[user.role] || "index.html";
                    if (targetUrl !== "index.html") window.location.replace(targetUrl);
                }
            } catch (e) { console.error("Session parse error", e); }
        }

        // Allow Enter key to submit
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') login();
        });

        function showStatus(msg, type = 'error') {
            const el = document.getElementById('statusMsg');
            el.textContent = msg;
            el.className = type;
            el.style.display = 'block';
        }

        // Standalone login function (fully self-contained)
        window.login = async function () {
            const btn = document.getElementById('loginBtn');
            const id = document.getElementById('id').value.trim();
            const pass = document.getElementById('password').value;

            if (!id || !pass) {
                showStatus('⚠️ Please enter both ID and Password');
                return;
            }

            if (!window.supabase) {
                showStatus('⚠️ Database connection failed. Please refresh the page.', 'error');
                return;
            }

            btn.textContent = 'Authenticating...';
            btn.disabled = true;
            document.getElementById('statusMsg').style.display = 'none';

            const email = `${id}@dineshcrm.com`;

            try {
                let { data: authData, error: authError } = await window.supabase.auth.signInWithPassword({ email, password: pass });
                let profile = null;

                if (authError) {
                    // Fallback: check profiles table directly (migration/dev mode)
                    const { data: fallbackProfile, error: fallbackError } = await window.supabase
                        .from('profiles').select('*').eq('staff_id', id).single();

                    if (fallbackError || !fallbackProfile || pass !== '123123') {
                        showStatus('❌ Invalid ID or password', 'error');
                        btn.textContent = 'Access Dashboard';
                        btn.disabled = false;
                        return;
                    }
                    profile = fallbackProfile;
                    authData = { user: { id: profile.id, email: profile.email } };
                } else {
                    const { data: syncProfile } = await window.supabase
                        .from('profiles').select('*').eq('id', authData.user.id).single();
                    profile = syncProfile;
                }

                const sessionUser = {
                    id: profile?.id || authData?.user?.id,
                    staffId: profile?.staff_id || id,
                    role: profile?.role || 'staff', // strict fallback
                    name: profile?.name || (authData?.user?.email ? authData.user.email.split('@')[0] : 'User')
                };

                localStorage.setItem('currentUser', JSON.stringify(sessionUser));

                const routeMap = {
                    admin: 'ADMIN/index.html',
                    staff: 'sales.html',
                    delivery_boy: 'delivery_boy.html'
                };

                showStatus('✓ Login successful! Redirecting...', 'info');
                setTimeout(() => {
                    window.location.href = routeMap[sessionUser.role] || 'index.html';
                }, 600);

            } catch (err) {
                console.error('Login Error:', err);
                showStatus('⚠️ System error: ' + err.message, 'error');
                btn.textContent = 'Access Dashboard';
                btn.disabled = false;
            }
        };
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('/service-worker.js'));
        }
    </script>
</body>

</html>
