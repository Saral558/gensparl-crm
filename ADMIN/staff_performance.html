<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Performance — Dinesh CRM</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../css/theme.css">
  <script src="../js/ui/navigation.js"></script>
  <style>
    /* Specific to Performance */
    .filter-bar { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 24px; }
    .pill { 
      background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); color: var(--muted);
      padding: 8px 16px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s;
    }
    .pill:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--primary); }
    .pill.active { background: var(--primary); color: white; border-color: var(--primary); }
    
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; display: flex; align-items: center; gap: 16px; }
    .stat-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .icon-primary { background: var(--primary-soft); color: var(--primary); }
    .icon-success { background: var(--success-soft); color: var(--success); }
    .icon-warning { background: var(--warning-soft); color: var(--warning); }
    
    .rank-num { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; background: var(--card2); color: var(--muted); }
    .rank-num.r1 { background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff; }
    .rank-num.r2 { background: linear-gradient(135deg, #94a3b8, #64748b); color: #fff; }
    .rank-num.r3 { background: linear-gradient(135deg, #c47c33, #9c5f23); color: #fff; }
    
    .pm-tag { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; display: inline-block; }
    .pm-tag.cash { background: var(--green-glow); color: #10b981; }
    .pm-tag.upi { background: var(--primary-glow); color: #6366f1; }
    .pm-tag.online { background: var(--cyan-glow); color: #06b6d4; }
    .pm-tag.credit { background: var(--amber-glow); color: #f59e0b; }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: auto; }

    /* Modal Backdrop */
    .modal-backdrop { 
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; 
      -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
      align-items: center; justify-content: center; padding: 20px; 
    }
    .leaderboard-title { font-size: 18px; }
    .table-loader-row td { text-align: center; padding: 60px; }
    .modal-close-btn { position: absolute; top: 20px; right: 20px; background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 24px; }
    .modal-charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 24px; }
    @media (max-width: 768px) {
      .modal-charts-grid { grid-template-columns: 1fr; }
      .modal { padding: 20px; border-radius: 16px; }
    }
    .modal-backdrop.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; width: 100%; max-width: 900px; padding: 32px; position: relative; max-height: 90vh; overflow-y: auto; }
  </style>

  <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
</head>
<body>
  <div class="topbar">
    <div class="brand">📈 Staff Performance</div>
    <div class="topbar-right">
      <span class="user-tag" id="userTag">Loading...</span>
      <button class="btn-back" onclick="history.back()">← Back</button>
    </div>
  </div>

  <div class="container content animate-in">
    <div class="section-header">
      <div>
        <h1>Performance Analytics</h1>
        <p class="subtitle" id="pageDate">Real-time Data</p>
      </div>
    </div>

    <!-- Filters -->
    <div class="filter-bar">
      <div class="date-pills" id="datePills">
        <button class="pill active" data-days="0" onclick="setDateFilter(this, 0)">Today</button>
        <button class="pill" data-days="1" onclick="setDateFilter(this, 1)">Yesterday</button>
        <button class="pill" data-days="-1" onclick="setDateFilter(this, -1)">All Time</button>
      </div>
      <div class="custom-date-wrap">
        <input type="date" id="customDate" class="pill" onchange="setCustomDate(this.value)" title="Custom Date">
      </div>
      <div class="pm-filter">
        <button class="pill active" onclick="setPmFilter(this, '')">All Payments</button>
        <button class="pill" onclick="setPmFilter(this, 'cash')">Cash</button>
        <button class="pill" onclick="setPmFilter(this, 'upi')">UPI</button>
      </div>
    </div>

    <!-- Summary Stats -->
    <div class="stats-row">
      <div class="stat-card glass">
        <div class="stat-icon icon-primary"><i data-lucide="trending-up"></i></div>
        <div>
          <span class="stat-label">Total Volume</span>
          <span class="stat-value" id="cardTotalSales">₹0</span>
        </div>
      </div>
      <div class="stat-card glass">
        <div class="stat-icon icon-success"><i data-lucide="award"></i></div>
        <div>
          <span class="stat-label">Total Profit</span>
          <span class="stat-value text-success" id="cardTotalProfit">₹0</span>
        </div>
      </div>
      <div class="stat-card glass">
        <div class="stat-icon icon-warning"><i data-lucide="hash"></i></div>
        <div>
          <span class="stat-label">Transactions</span>
          <span class="stat-value" id="cardTxns">0</span>
        </div>
      </div>
    </div>

    <!-- Leaderboard -->
    <div class="card glass">
      <div class="section-header">
        <h2 class="leaderboard-title">👤 Staff Leaderboard</h2>
      </div>
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Rank</th>
              <th>Staff Member</th>
              <th>Sales</th>
              <th>Profit</th>
              <th>Txns</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="staffTableBody">
            <tr class="table-loader-row"><td colspan="6"><div class="spin"></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-backdrop" id="staffModal">
    <div class="modal">
      <button class="modal-close modal-close-btn" onclick="closeModal()">&times;</button>
      <div class="modal-header">
        <h2 id="modalStaffName">Staff Profile</h2>
        <p id="modalStaffSub" class="subtitle">Detailed performance metrics</p>
      </div>
      <!-- Stats and Charts... -->
      <div class="modal-charts-grid">
        <div class="card glass">
          <canvas id="modalDonutChart"></canvas>
        </div>
        <div class="card glass">
          <canvas id="modalBarChart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/supabase-client.js"></script>
  <script src="../app.js"></script>
  <script>
    let activeDate = 'today';
    let activeCustomDate = null;
    let activePM = '';
    let rawSales = [];
    let modalDonut = null, modalBar = null;

    const INR = v => '₹' + Math.round(v).toLocaleString('en-IN');
    const escHtml = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

    function setDateFilter(btn, daysAgo) {
      document.querySelectorAll('.date-pills .pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      activeDate = daysAgo;
      loadDashboard();
    }

    function setCustomDate(val) {
      activeDate = 'custom';
      activeCustomDate = val;
      loadDashboard();
    }

    function setPmFilter(btn, pm) {
      document.querySelectorAll('.pm-filter .pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      activePM = pm;
      renderAll(rawSales);
    }

    async function loadDashboard() {
      const tb = document.getElementById('staffTableBody');
      tb.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 60px"><div class="spin"></div></td></tr>';
      
      try {
        const { data, error } = await window.supabase.from('sales').select('*');
        if (error) throw error;
        rawSales = data || [];
        renderAll(rawSales);
      } catch (e) {
        tb.innerHTML = `<tr><td colspan="6" style="color: var(--red); text-align: center; padding: 40px">Error: ${e.message}</td></tr>`;
      }
    }

    function renderAll(sales) {
      // Basic aggregation logic simplified for restoration
      const map = {};
      sales.forEach(s => {
        const name = s.salesboy_name || 'Staff';
        if (!map[name]) map[name] = { name, total: 0, profit: 0, txns: 0 };
        map[name].total += s.amount || 0;
        map[name].profit += s.profit_amount || 0;
        map[name].txns++;
      });
      const data = Object.values(map).sort((a,b) => b.profit - a.profit);

      document.getElementById('cardTotalSales').textContent = INR(data.reduce((a,b) => a+b.total, 0));
      document.getElementById('cardTotalProfit').textContent = INR(data.reduce((a,b) => a+b.profit, 0));
      document.getElementById('cardTxns').textContent = data.reduce((a,b) => a+b.txns, 0);

      document.getElementById('staffTableBody').innerHTML = data.map((s, i) => `
        <tr onclick="openModal('${s.name}')">
          <td><div class="rank-num ${i<3?'r'+(i+1):''}">${i+1}</div></td>
          <td style="font-weight:700">${escHtml(s.name)}</td>
          <td>${INR(s.total)}</td>
          <td class="text-success">${INR(s.profit)}</td>
          <td>${s.txns}</td>
          <td><span class="pm-tag online">Active</span></td>
        </tr>
      `).join('');
    }

    function openModal(name) { 
      document.getElementById('modalStaffName').textContent = name;
      document.getElementById('staffModal').classList.add('open'); 
      lucide.createIcons();
    }
    function closeModal() { document.getElementById('staffModal').classList.remove('open'); }

    window.onload = () => {
      loadDashboard();
      lucide.createIcons();
    };
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/service-worker.js'));
    }
  </script>
</body>
</html>
