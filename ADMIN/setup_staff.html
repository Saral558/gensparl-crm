<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gensparl CRM — Backend Setup</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --text: #f8fafc;
            --success: #22c55e;
            --error: #ef4444;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .setup-card {
            background: var(--card);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 { margin-bottom: 8px; font-weight: 800; }
        p { opacity: 0.7; font-size: 14px; margin-bottom: 30px; }
        .btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
        }
        .btn:active { transform: scale(0.98); }
        #logs {
            margin-top: 30px;
            text-align: left;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 12px;
            display: none;
        }
        .log-entry { margin-bottom: 4px; }
        .log-success { color: var(--success); }
        .log-error { color: var(--error); }
    </style>
</head>
<body>
    <div class="setup-card">
        <h1>Backend Setup</h1>
        <p>This tool will register 8 staff accounts (1001-1008) with the password <b>123654</b>.</p>
        
        <button id="setupBtn" class="btn">🚀 Run Staff Setup</button>
        
        <div id="logs"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://idtisrnhmivrvgzilxyo.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_BNL9AQlF8tkW2TCH4_CFdQ_NYk_rVnV';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const STAFF = [
            { id: '1001', role: 'admin' },
            { id: '1002', role: 'sales' },
            { id: '1003', role: 'finance' },
            { id: '1004', role: 'delivery' },
            { id: '1005', role: 'service' },
            { id: '1006', role: 'expense' },
            { id: '1007', role: 'gift_box' },
            { id: '1008', role: 'inventory' }
        ];

        const logEl = document.getElementById('logs');
        const btn = document.getElementById('setupBtn');

        function log(msg, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logEl.appendChild(entry);
            logEl.scrollTop = logEl.scrollHeight;
        }

        btn.onclick = async () => {
            btn.disabled = true;
            btn.innerText = "⏳ Running Setup...";
            logEl.style.display = 'block';
            log("Starting staff registration process...");

            for (const s of STAFF) {
                const email = `${s.id}@dineshcrm.com`;
                log(`Processing ${email} (${s.role})...`);
                
                try {
                    // 1. Sign up the user
                    const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                        email: email,
                        password: '123654'
                    });

                    let userId = authData?.user?.id;
                    let isNew = !!authData?.user;

                    if (authError) {
                        if (authError.message.includes("already registered")) {
                            log(`Account ${s.id} exists. Attempting fetch...`, 'info');
                            // We can't get the ID from signUp error, so we find it in the public profiles if it exists
                            const { data: pData } = await supabaseClient.from('profiles').select('id').eq('email', email).single();
                            userId = pData?.id;
                            isNew = false;
                        } else {
                            log(`Auth Error for ${s.id}: ${authError.message}`, 'error');
                            continue;
                        }
                    }

                    if (userId) {
                        // 2. Synchronize Profile (Zero Error Mapping)
                        const { error: profError } = await supabaseClient
                            .from('profiles')
                            .upsert({
                                id: userId,
                                email: email,
                                role: s.role,
                                name: `${s.role.charAt(0).toUpperCase() + s.role.slice(1)} Staff`,
                                active: true
                            }, { onConflict: 'email' });

                        if (profError) {
                            log(`❌ Profile Sync Failure for ${s.id}: ${profError.message}`, 'error');
                        } else {
                            const statusLabel = isNew ? "Created" : "Synced";
                            log(`✅ ${s.id} (${s.role}) — ${statusLabel}!`, 'success');
                        }
                    } else {
                        log(`🚨 Failed to obtain ID for ${s.id}. Ensure you are signed in as Admin.`, 'error');
                    }
                } catch (e) {
                    log(`Unexpected system error for ${s.id}: ${e.message}`, 'error');
                }
                
                await new Promise(r => setTimeout(r, 1000)); // Safer delay
            }



            log("✅ Staff setup completed.", "success");
            btn.innerText = "✨ Setup Complete";
            btn.style.background = "#22c55e";
        };
    </script>
</body>
</html>
