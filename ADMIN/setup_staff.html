<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gensparl CRM — Backend Setup</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --text: #f8fafc;
            --success: #22c55e;
            --error: #ef4444;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .setup-card {
            background: var(--card);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            margin-bottom: 8px;
            font-weight: 800;
        }

        p {
            opacity: 0.7;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
        }

        .btn:active {
            transform: scale(0.98);
        }

        #logs {
            margin-top: 30px;
            text-align: left;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 12px;
            display: none;
        }

        .log-entry {
            margin-bottom: 4px;
        }

        .log-success {
            color: var(--success);
        }

        .log-error {
            color: var(--error);
        }
    </style>
</head>

<body>
    <div class="setup-card">
        <h1>Backend Setup</h1>
        <p>This tool will register 5 staff accounts (1001-1005) with the password <b>123654</b>.</p>

        <button id="setupBtn" class="btn">🚀 Run Staff Setup</button>

        <div id="logs"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://gyqficxgcbtbtvabfgqt.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_T_i4I8IubnQKJM0zo9lrbA_gdpOVtil';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const STAFF = [
            { id: '1001', role: 'admin', name: 'Admin' },
            { id: '1002', role: 'delivery', name: 'Bijay' },
            { id: '1003', role: 'expense', name: 'Ramesh' },
            { id: '1004', role: 'gift_box', name: 'Deepak' },
            { id: '1005', role: 'sales', name: 'Sunil' },
            { id: '6001', role: 'delivery_manager', name: 'Delivery Manager' }
        ];

        const logEl = document.getElementById('logs');
        const btn = document.getElementById('setupBtn');

        function log(msg, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logEl.appendChild(entry);
            logEl.scrollTop = logEl.scrollHeight;
        }

        btn.onclick = async () => {
            btn.disabled = true;
            btn.innerText = "⏳ Running Setup...";
            logEl.style.display = 'block';
            log("Starting staff registration process...");

            for (let i = 0; i < STAFF.length; i++) {
                const s = STAFF[i];
                const email = `${s.id}@dineshcrm.com`; // Switched to dineshcrm.com
                const password = '123654';
                
                log(`[${i+1}/${STAFF.length}] Preparing ${email}...`, 'info');
                
                try {
                    // 1. Try to register
                    let { data: authData, error: authError } = await supabaseClient.auth.signUp({
                        email: email, password: password
                    });

                    if (authError) {
                        if (authError.message.includes("Signups are disabled")) {
                            log(`🚨 CRITICAL: Signups are DISABLED in your Supabase Auth settings. Please go to your Supabase Dashboard -> Authentication -> Providers -> Email and turn ON 'Enable Signups'.`, 'error');
                            break; // Stop everything
                        }
                        
                        if (authError.message.includes("rate limit")) {
                            log(`⏳ Rate Limited! Waiting 60 seconds before retrying...`, 'warning');
                            await new Promise(r => setTimeout(r, 60000));
                            i--; // Retry same user
                            continue;
                        }
                    }

                    let userId = authData?.user?.id;
                    let isNew = !!authData?.user;

                    // 2. REPAIR LOGIC: If user exists, sign in temporarily to get ID
                    if (!userId) {
                        log(`Account ${s.id} might exist. Verifying...`, 'info');
                        const { data: signInData, error: signInError } = await supabaseClient.auth.signInWithPassword({
                            email: email, password: password
                        });
                        
                        if (signInError) {
                            log(`❌ Login Check Failed for ${s.id}: ${signInError.message}`, 'error');
                            log(`Try deleting the user ${email} from Supabase Auth Dashboard first.`, 'warning');
                            continue;
                        }
                        userId = signInData.user.id;
                        isNew = false;
                    }

                    if (userId) {
                        // 2. Sync Profile
                        const { error: profError } = await supabaseClient.from('profiles').upsert({
                            id: userId, email: email, role: s.role, staff_id: s.id,
                            name: s.name,
                            active: true
                        }, { onConflict: 'email' });

                        await supabaseClient.auth.signOut();

                        if (profError) {
                            log(`❌ Profile sync failed for ${s.id}: ${profError.message}`, 'error');
                        } else {
                            log(`✅ ${s.id} is READY! (${isNew ? "Created" : "Repaired"})`, 'success');
                        }
                    }
                } catch (e) {
                    log(`Unexpected error: ${e.message}`, 'error');
                }
                
                // ⏳ RATE LIMIT BYPASS: Wait 15 seconds before next account
                if (i < STAFF.length - 1) {
                    log(`Waiting 15 seconds for Rate Limit bypass...`, 'info');
                    for(let countdown = 15; countdown > 0; countdown--) {
                        btn.innerText = `⏳ Next in ${countdown}s...`;
                        await new Promise(r => setTimeout(r, 1000));
                    }
                }
            }

            log("🎉 ALL ACCOUNTS SYNCED SUCCESSFULLY!", "success");
            log("You can now login with the IDs from the image and password 123654.", "info");
            btn.innerText = "✨ Setup Finished!";
            btn.style.background = "#22c55e";
        };
    </script>
</body>

</html>
