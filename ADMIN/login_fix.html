<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Force-Repair — Deep Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --text: #f8fafc;
            --success: #22c55e;
            --error: #ef4444;
            --warning: #f59e0b;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .fix-card {
            background: var(--card);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 550px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        h1 { margin-bottom: 8px; font-weight: 800; font-size: 28px; color: var(--accent); }
        .subtitle { opacity:0.7; font-size:14px; margin-bottom: 30px; letter-spacing: 0.5px; }
        .btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 18px 36px;
            border-radius: 14px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 10px 20px -5px rgba(56,189,248,0.4); }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        
        #console {
            margin-top: 30px;
            text-align: left;
            font-size: 13px;
            max-height: 250px;
            overflow-y: auto;
            background: rgba(0,0,0,0.4);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            display: none;
            font-family: 'Fira Code', 'Courier New', monospace;
        }
        .log-entry { margin-bottom: 8px; line-height: 1.5; border-bottom: 1px solid rgba(255,255,255,0.03); padding-bottom: 4px; }
        .log-success { color: var(--success); }
        .log-error { color: var(--error); border-left: 3px solid var(--error); padding-left: 10px; }
        .log-warning { color: var(--warning); border-left: 3px solid var(--warning); padding-left: 10px; }
        
        .role-badge { font-family: sans-serif; font-size: 10px; background: rgba(56,189,248,0.1); color: var(--accent); padding: 2px 6px; border-radius: 4px; margin-right: 8px; font-weight: 700; text-transform: uppercase; }
        .description-text { font-size: 14px; margin-bottom: 25px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="fix-card">
        <h1>🔐 CRM Deep Repair</h1>
        <p class="subtitle">Official SDK Auth Provisioning System</p>
        
        <p class="description-text"> This tool will force-register your 8 staff IDs using the **Official Supabase SDK**. This fixes the "Invalid credentials" error by using the correct server-side encryption.</p>

        <button id="fixBtn" class="btn">🚀 Start Deep Fix Tools</button>
        
        <div id="console"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://gyqficxgcbtbtvabfgqt.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_T_i4I8IubnQKJM0zo9lrbA_gdpOVtil';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const STAFF_ROLES = [
            { id: '10001', role: 'admin' },
            { id: '10002', role: 'sales' },
            { id: '10003', role: 'finance' },
            { id: '10004', role: 'delivery' },
            { id: '10005', role: 'service' },
            { id: '10006', role: 'expense' },
            { id: '10007', role: 'gift_box' },
            { id: '10008', role: 'inventory' }
        ];

        const consoleEl = document.getElementById('console');
        const btn = document.getElementById('fixBtn');

        function log(msg, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            consoleEl.appendChild(entry);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        btn.onclick = async () => {
            btn.disabled = true;
            btn.innerText = "⏳ Deep-Fixing Auth Layers...";
            consoleEl.style.display = 'block';
            log("🔬 Initializing official SDK repair...", "info");

            for (const s of STAFF_ROLES) {
                const email = `${s.id}@dineshcrm.com`;
                const password = '123654';
                
                log(`<span class='role-badge'>${s.role}</span> Accessing account ${email}...`);

                try {
                    // 1. Force Registry via Official API
                    const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                        email: email,
                        password: password
                    });

                    // 2. Identify Result
                    let userId = authData?.user?.id;

                    if (authError || !userId) {
                        log(`Account ${s.id} exists. Attempting temporary sign-in to capture ID...`, 'warning');
                        // Use signIn to get the UID if user already exists
                        const { data: signInData, error: signInError } = await supabaseClient.auth.signInWithPassword({
                            email: email,
                            password: password
                        });
                        
                        if (signInError) {
                            log(`🚨 Authentication Failure for ${s.id}: ${signInError.message}`, 'error');
                            continue;
                        }
                        userId = signInData.user.id;
                    } else {
                        log(`Successfully registered new ID ${s.id}!`, 'success');
                    }

                    // 3. Force-Sync Profile
                    if (userId) {
                        const { error: profError } = await supabaseClient
                            .from('profiles')
                            .upsert({
                                id: userId,
                                email: email,
                                role: s.role,
                                staff_id: s.id,
                                name: `${s.role.charAt(0).toUpperCase() + s.role.slice(1)} Staff`,
                                active: true,
                                updated_at: new Date()
                            }, { onConflict: 'email' });

                        // 4. Logout to clear session for next step
                        await supabaseClient.auth.signOut();

                        if (profError) {
                             log(`❌ Profile Sync Failure for ${s.id}: ${profError.message}`, 'error');
                        } else {
                             log(`✅ <b>Account ${s.id}</b> is <b>Login Ready</b>. Profile Mapped.`, 'success');
                        }
                    }

                } catch (e) {
                     log(`System error for ${s.id}: ${e.message}`, 'error');
                }

                // Smooth delay
                await new Promise(r => setTimeout(r, 800));
            }

            log("✨ <b>Deep Fix Complete</b>. Please return to the login screen and enter <b>10001</b> and <b>123654</b>.", "success");
            btn.innerText = "✨ System Restored";
            btn.style.background = "#22c55e";
        };
    </script>
</body>
</html>
